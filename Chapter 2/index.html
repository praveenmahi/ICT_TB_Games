<!DOCTYPE html>
<html>
<head>
    <title>Number System Tap Match Game</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f0f8ff;
            margin: 0;
            padding: 10px;
        }

        h1 {
            font-size: 22px;
        }

        #gameArea {
            display: none;
        }

        .container {
            display: flex;
            gap: 15px;
            margin-top: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .items, .targets {
            width: 45%;
            max-width: 400px;
        }

        .card {
            padding: 20px;
            margin: 12px 0;
            border-radius: 12px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
        }

        .item {
            background: #4CAF50;
            color: white;
        }

        .target {
            background: #ddd;
            border: 3px dashed #555;
        }

        .selected {
            outline: 4px solid orange;
        }

        .correct {
            background: #8BC34A !important;
            color: white;
        }

        .wrong {
            background: #f44336 !important;
            color: white;
        }

        button {
            padding: 16px;
            font-size: 18px;
            margin: 10px;
            width: 90%;
            max-width: 320px;
            background: #2196F3;
            color: white;
            border: none;
            border-radius: 8px;
        }

        #scoreBoard {
            font-size: 22px;
            margin-top: 15px;
            font-weight: bold;
        }

        @media (max-width: 768px) {
            .container {
                flex-direction: column;
                align-items: center;
            }

            .items, .targets {
                width: 100%;
            }

            .card {
                font-size: 20px;
                padding: 22px;
            }
        }
    </style>
</head>

<body>

<h1>Tap to Match: Number System → Base</h1>

<button id="startBtn" onclick="startGame()">Start Game</button>

<div id="gameArea">
    <div class="container">
        <div class="items"></div>
        <div class="targets"></div>
    </div>

    <div id="scoreBoard">Score: 0</div>
</div>

<div id="endScreen" style="display:none;">
    <h2 id="finalScore"></h2>
    <button onclick="restartGame()">Restart Game</button>
</div>

<audio id="correctSound" src="correct.mp3"></audio>
<audio id="wrongSound" src="wrong.mp3"></audio>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
let score = 0;
let total = 4;
let selectedItem = null;

const itemsData = [
    { id: "decimal", name: "Decimal", base: "Base 10" },
    { id: "binary", name: "Binary", base: "Base 2" },
    { id: "octal", name: "Octal", base: "Base 8" },
    { id: "hex", name: "Hexadecimal", base: "Base 16" }
];

/* ✅ Fisher–Yates Shuffle */
function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        let j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

function startGame() {
    document.getElementById("startBtn").style.display = "none";
    document.getElementById("gameArea").style.display = "block";
    loadGame();
}

function loadGame() {
    const itemsContainer = document.querySelector(".items");
    const targetsContainer = document.querySelector(".targets");

    itemsContainer.innerHTML = "";
    targetsContainer.innerHTML = "";

    let shuffledItems = shuffle([...itemsData]);
    let shuffledTargets = shuffle([...itemsData]);

    shuffledItems.forEach(item => {
        let div = document.createElement("div");
        div.className = "card item";
        div.innerText = item.name;
        div.dataset.id = item.id;

        div.onclick = () => selectItem(div);
        itemsContainer.appendChild(div);
    });

    shuffledTargets.forEach(item => {
        let div = document.createElement("div");
        div.className = "card target";
        div.innerText = item.base;
        div.dataset.match = item.id;

        div.onclick = () => matchTarget(div);
        targetsContainer.appendChild(div);
    });
}

function selectItem(element) {
    document.querySelectorAll(".item").forEach(el => el.classList.remove("selected"));
    element.classList.add("selected");
    selectedItem = element;
}

function matchTarget(target) {
    if (!selectedItem) return;

    let itemId = selectedItem.dataset.id;
    let matchId = target.dataset.match;

    if (itemId === matchId) {
        target.classList.add("correct");
        selectedItem.style.visibility = "hidden";

        document.getElementById("correctSound").play();

        confetti({
            particleCount: 100,
            spread: 70
        });

        score++;
    } else {
        target.classList.add("wrong");
        document.getElementById("wrongSound").play();

        setTimeout(() => target.classList.remove("wrong"), 500);
    }

    selectedItem.classList.remove("selected");
    selectedItem = null;

    document.getElementById("scoreBoard").innerText = "Score: " + score;

    if (score === total) {
        endGame();
    }
}

function endGame() {
    document.getElementById("gameArea").style.display = "none";
    document.getElementById("endScreen").style.display = "block";
    document.getElementById("finalScore").innerText =
        "🎉 Your Score: " + score + " / " + total;
}

function restartGame() {
    // Reset values
    score = 0;
    selectedItem = null;

    // Hide end screen
    document.getElementById("endScreen").style.display = "none";

    // Show game directly
    document.getElementById("gameArea").style.display = "block";

    // Reset score
    document.getElementById("scoreBoard").innerText = "Score: 0";

    // Reload game with new shuffle
    loadGame();
}
</script>

</body>
</html>
